<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mundo Vampírico</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;600&family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    height: 100vh;
    background: radial-gradient(circle at 50% 20%, #1a0000, #000 90%);
    font-family: 'Cinzel', serif;
    color: #ff4444;
    text-align: center;
}

.moon {
    position: absolute;
    top: 50px;
    right: 120px;
    width: 140px;
    height: 140px;
    background: radial-gradient(circle at 30% 30%, #ffffff 0%, #dddddd 60%, #bbbbbb 85%, #999999 95%);
    border-radius: 50%;
    box-shadow:
        0 0 20px #ffffff,
        0 0 50px #eeeeee inset,
        0 0 80px #aaaaaa inset;
    z-index: 5;
    animation: moonGlow 6s infinite alternate;
}

@keyframes moonGlow {
    0% { box-shadow: 0 0 20px #ffffff, 0 0 50px #eeeeee inset, 0 0 80px #aaaaaa inset; }
    100% { box-shadow: 0 0 30px #ffffff, 0 0 60px #dddddd inset, 0 0 90px #999999 inset; }
}

h1 {
    margin-top: 60px;
    font-family: 'UnifrakturCook', cursive;
    font-size: 3em;
    color: #ff4444;
    text-shadow:
        0 0 8px #ff4444,
        0 0 16px #ff2222,
        0 0 32px #880000;
}

.buttons {
    margin-top: 20px;
    position: relative;
    z-index: 10;
}

button {
    background: rgba(0,0,0,0.2);
    border: 2px solid #ff4444;
    color: #ff6666;
    padding: 12px 25px;
    margin: 8px;
    font-family: 'Cinzel', serif;
    cursor: pointer;
    transition: 0.3s;
    border-radius: 6px;
    box-shadow: 0 0 8px #ff4444, 0 0 20px #880000 inset;
}

button:hover {
    background: rgba(255,0,0,0.1);
    transform: scale(1.05);
    box-shadow: 0 0 15px #ff5555, 0 0 30px #aa2222 inset;
}

#poem {
    margin-top: 30px;
    font-size: 1.3em;
    line-height: 2em;
    opacity: 0;
    max-width: 700px;
    margin-left: auto;
    margin-right: auto;
    font-style: italic;
    color: #ff6666;
    text-shadow: 0 0 5px #ff6666, 0 0 10px #ff2222, 0 0 20px #880000;
    transition: opacity 1.5s ease-in-out;
    position: relative;
    z-index: 10;
}

.hill {
    position: absolute;
    bottom: 0;
    width: 110%;
    height: 280px;
    background: linear-gradient(to top, #000, #220000);
    border-top-left-radius: 70% 180px;
    border-top-right-radius: 70% 180px;
    transform: translateX(-5%);
    z-index: 1;
}

.raindrop {
    position: absolute;
    width: 2px;
    height: 14px;
    background: rgba(255,100,100,0.25);
    border-radius: 1px;
    animation: fall linear infinite;
    filter: drop-shadow(0 0 3px #ff4444);
    z-index: 3;
}

@keyframes fall {
    0% { transform: translateY(-20px); opacity: 0; }
    10% { opacity: 1; }
    100% { transform: translateY(700px); opacity: 0; }
}

.fog {
    position: absolute;
    bottom: 0;
    width: 200%;
    height: 120px;
    background: linear-gradient(to top, rgba(255,100,100,0.02), transparent);
    animation: fogMove 60s linear infinite;
    z-index: 2;
}

@keyframes fogMove {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
}

#music-container {
    display: none;
    margin-top: 20px;
    opacity: 0;
    transition: opacity 1s ease;
}
</style>
</head>
<body>

<div class="moon"></div>

<h1>Mundo entre Sombras</h1>

<div class="buttons">
    <button style="position:absolute; top:160px; left:10%;" onclick="showPoem(1)">Recuerdo Sangriento</button>
    <button style="position:absolute; top:200px; left:35%;" onclick="showPoem(2)">Amor oscuro</button>
    <button style="position:absolute; top:180px; left:60%;" onclick="showPoem(3)">Eternidad</button>
    <button style="position:absolute; top:250px; left:20%;" onclick="showPoem(4)">Réquiem</button>
    <button style="position:absolute; top:220px; left:88%;" onclick="showPoem(5)">Sombras</button>
    <button style="position:absolute; top:270px; left:70%;" onclick="showPoem(6)">Noche eterna</button>
    <button style="position:absolute; top:310px; left:85%;" onclick="showPoem(7)">Alma Perdida</button>
    <button style="position:absolute; top:270px; left:0%;" onclick="showPoem(8)">Noche Sin Fin</button>
    <button style="position:absolute; top:270px; left:40%;" onclick="showPoem(9)">Susurros</button>
    <button style="position:absolute; top:350px; left:50%;" onclick="toggleMusic()">Música para el Alma</button>
</div>

<div id="poem"></div>

<div class="hill"></div>
<div class="tree"></div>
<div class="fog"></div>

<div id="music-container">
    <audio id="background-music" loop>
        <source src="Ascension.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
function showPoem(type) {
  const poem = document.getElementById("poem");
  let text = "";
  if (type === 1) text = `Recuerdo Sangriento:<br>La sangre de la luna acaricia mi piel,<br>y el eco del pasado susurra mi nombre…`;
  else if (type === 2) text = `Amor Oscuro:<br>Te encontré entre sombras,<br>donde el amor y la muerte se abrazan sin fin…`;
  else if (type === 3) text = `Eternidad:<br>Eterna es la noche,<br>y en ella mis deseos flotan como cuervos negros…`;
  else if (type === 4) text = `Réquiem:<br>Un suspiro funeral en la penumbra,<br>donde las almas cantan su último adiós…`;
  else if (type === 5) text = `Sombras:<br>Entre la niebla y la oscuridad,<br>los secretos susurran y tiemblan…`;
  else if (type === 6) text = `Noche Eterna:<br>La noche se extiende sin horizonte,<br>y los susurros de lo perdido flotan en el aire…`;
  else if (type === 7) text = `Alma Perdida:<br>Alma errante entre tumbas y estrellas,<br>buscando la eternidad en mi reflejo…`;
  else if (type === 8) text = `Noche Sin Fin:<br>Ojos que no descansan,<br>y la oscuridad cubre todos los caminos…`;
  else if (type === 9) text = `Susurros:<br>Voces que recorren la noche,<br>contando historias que nadie debe oír…`;

  poem.style.opacity = 0;
  setTimeout(() => { poem.innerHTML = text; poem.style.opacity = 1; }, 300);
}

// Lluvia roja
window.onload = () => {
    for(let i=0;i<120;i++){
        const drop = document.createElement("div");
        drop.className = "raindrop";
        drop.style.left = Math.random()*100+"%";
        drop.style.top = Math.random()*-600+"px";
        drop.style.animationDuration = (0.7 + Math.random()*2)+"s";
        drop.style.animationDelay = Math.random()*5+"s";
        document.body.appendChild(drop);
    }
}

function toggleMusic() {
    const music = document.getElementById("background-music");
    if (music.paused) {
        music.volume = 0.2;
        music.play().catch(() => console.log("Click requerido para reproducir audio"));
    } else {
        music.pause();
    }
}

</script>

</body>
</html>
